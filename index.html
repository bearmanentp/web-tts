<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">모바일 & 사파리 지원 TTS</h1>
            <p class="text-sm text-slate-500 mt-1">아이폰, 맥북 사파리에서도 정상 작동합니다.</p>
        </div>

        <!-- 설정 영역 -->
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">목소리 고르기</label>
            <select id="voiceSelect" class="w-full bg-slate-100 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">목소리를 불러오는 중입니다...</option>
            </select>
        </div>

        <!-- 텍스트 입력 영역 -->
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">텍스트 입력</label>
            <textarea id="ttsText" rows="4" class="w-full bg-slate-100 border border-slate-300 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-slate-400" placeholder="내용을 입력하세요...">안녕하세요! 사파리 브라우저에서도 아주 잘 작동합니다. Welcome to Safari TTS test!</textarea>
        </div>

        <!-- 제어 버튼 -->
        <div class="flex gap-2">
            <button id="playBtn" onclick="speakText()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition duration-200 shadow-md">
                목소리 듣기
            </button>
            <button id="stopBtn" onclick="stopText()" class="bg-red-500 hover:bg-red-600 text-white font-medium px-6 py-3 rounded-lg transition duration-200 shadow-md">
                정지
            </button>
        </div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        const voiceSelect = document.getElementById('voiceSelect');
        let voices = [];

        function loadVoices() {
            voices = synth.getVoices();
            
            // 사파리 초기 로딩 시 목록이 비어있을 때를 대비한 안전 장치
            if (voices.length === 0) return;

            voiceSelect.innerHTML = '';

            // 한국어(ko)와 영어(en)만 필터링
            const filteredVoices = voices.filter(voice => 
                voice.lang.startsWith('ko') || voice.lang.startsWith('en')
            );

            if (filteredVoices.length === 0) {
                voiceSelect.innerHTML = '<option value="">지원하는 목소리가 없습니다.</option>';
                return;
            }

            filteredVoices.forEach(voice => {
                const option = document.createElement('option');
                option.value = voice.name;
                
                // 사파리/애플 목소리 구분을 위해 이름 뒤에 프리미엄/Siri 표시 분기 처리
                let quality = voice.name.includes('Premium') || voice.name.includes('Siri') ? ' [고품질]' : '';
                option.textContent = `${voice.name} (${voice.lang})${quality}`;
                voiceSelect.appendChild(option);
            });
        }

        // 일반 브라우저용 이벤트
        if (typeof synth !== 'undefined') {
            if (synth.onvoiceschanged !== undefined) {
                synth.onvoiceschanged = loadVoices;
            }
            // 사파리를 위해 주기적으로 목소리가 로드되었는지 체크하는 인터벌 추가 (사파리 버그 방지)
            const safariCheck = setInterval(() => {
                loadVoices();
                if (voices.length > 0) clearInterval(safariCheck);
            }, 100);
        }

        function speakText() {
            if (synth.speaking) {
                synth.cancel(); 
                // 사파리에서는 cancel 직후 바로 speak를 호출하면 씹히는 경우가 있어 살짝 딜레이를 줍니다.
                setTimeout(startSpeaking, 100);
            } else {
                startSpeaking();
            }
        }

        function startSpeaking() {
            const text = document.getElementById('ttsText').value.trim();
            if (!text) {
                alert('텍스트를 입력해주세요!');
                return;
            }

            const utterance = new SpeechSynthesisUtterance(text);
            const selectedVoiceName = voiceSelect.value;
            
            utterance.voice = voices.find(voice => voice.name === selectedVoiceName);
            utterance.rate = 1.0; 
            utterance.pitch = 1.0;

            synth.speak(utterance);
        }

        function stopText() {
            if (synth.speaking) {
                synth.cancel();
            }
        }
    </script>
</body>
</html>
