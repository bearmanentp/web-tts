<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Ultimate DJ Master v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 p-6 font-sans">
    <div class="max-w-7xl mx-auto grid grid-cols-12 gap-6">
        
        <div class="col-span-4 bg-slate-900 p-6 rounded-3xl border border-slate-700">
            <h2 class="font-bold mb-4">📂 음원 폴더 로딩 (자동 캐시)</h2>
            <input type="file" id="folderLoader" webkitdirectory directory multiple class="text-xs mb-4">
            <div id="trackList" class="h-[400px] overflow-y-auto space-y-2 text-sm bg-slate-950 p-2 rounded border border-slate-800">
            </div>
        </div>

        <div class="col-span-8 bg-slate-900 p-6 rounded-3xl border border-emerald-900">
            <h2 class="font-bold mb-4 text-emerald-400">🗣️ TTS 마스터 설정 (시스템 전체 보이스 지원)</h2>
            <div class="grid grid-cols-3 gap-4 mb-4">
                <select id="voiceSelect" class="bg-slate-800 p-2 rounded col-span-3 border border-emerald-700"></select>
                <div><label class="text-xs">속도</label><input type="range" id="rate" min="0.5" max="2" step="0.1" value="1" class="w-full"></div>
                <div><label class="text-xs">높낮이</label><input type="range" id="pitch" min="0" max="2" step="0.1" value="1" class="w-full"></div>
                <button onclick="saveTtsSettings()" class="bg-emerald-800 rounded text-xs">설정 저장(캐시)</button>
            </div>
            <textarea id="scriptBox" class="w-full bg-slate-950 p-4 rounded-xl h-48 mb-4 border border-slate-700"></textarea>
            <button onclick="speak()" class="w-full bg-emerald-600 py-3 rounded-lg font-bold text-lg hover:bg-emerald-500">방송 송출</button>
        </div>
    </div>

    <script>
        const voiceSelect = document.getElementById('voiceSelect');

        // 1. 브라우저 지원 모든 목소리 불러오기 (비동기 처리)
        function populateVoices() {
            const voices = window.speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';
            voices.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.name;
                opt.textContent = `${v.name} (${v.lang}) ${v.default ? ' [기본]' : ''}`;
                voiceSelect.appendChild(opt);
            });
            // 저장된 목소리 복구
            const savedVoice = localStorage.getItem('tts_voice');
            if(savedVoice) voiceSelect.value = savedVoice;
        }

        // 보이스 리스트가 갱신될 때마다 호출
        window.speechSynthesis.onvoiceschanged = populateVoices;
        populateVoices(); // 초기 로드

        // 2. TTS 상세 설정 저장 (캐싱)
        function saveTtsSettings() {
            localStorage.setItem('tts_voice', voiceSelect.value);
            localStorage.setItem('tts_rate', document.getElementById('rate').value);
            localStorage.setItem('tts_pitch', document.getElementById('pitch').value);
            alert("목소리 및 설정이 캐시되었습니다.");
        }

        // 3. 방송 송출
        function speak() {
            const t = new SpeechSynthesisUtterance(document.getElementById('scriptBox').value);
            t.voice = window.speechSynthesis.getVoices().find(v => v.name === voiceSelect.value);
            t.rate = document.getElementById('rate').value;
            t.pitch = document.getElementById('pitch').value;
            window.speechSynthesis.speak(t);
        }

        // 4. 폴더 음원 리스트 로딩 (캐시 가능하게)
        document.getElementById('folderLoader').addEventListener('change', (e) => {
            const list = document.getElementById('trackList');
            list.innerHTML = '';
            Array.from(e.target.files).forEach(file => {
                if(file.type.startsWith('audio/')) {
                    const div = document.createElement('div');
                    div.className = "p-2 bg-slate-800 rounded text-xs truncate";
                    div.textContent = `🎵 ${file.name}`;
                    list.appendChild(div);
                }
            });
        });
    </script>
</body>
</html>
