<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DJ Master Studio v2.0 - FX Enhanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 p-6 font-sans">

    <div class="max-w-6xl mx-auto grid grid-cols-12 gap-6">
        
        <!-- DJ 믹싱 데스크 (크로스페이더 영향 O) -->
        <div class="col-span-8 bg-slate-900 p-6 rounded-3xl border border-slate-700 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-amber-500">🎧 Mixing Console (Music Only)</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <!-- Deck A -->
                <div class="bg-slate-800 p-4 rounded-xl">
                    <h3 class="font-bold mb-2">DECK A</h3>
                    <input type="file" class="mb-2 text-xs w-full" onchange="loadDeck('A', this)">
                    <div class="flex gap-2"><button onclick="playDeck('A')" class="bg-green-600 px-4 py-2 rounded">▶️</button></div>
                </div>
                <!-- Deck B -->
                <div class="bg-slate-800 p-4 rounded-xl">
                    <h3 class="font-bold mb-2">DECK B</h3>
                    <input type="file" class="mb-2 text-xs w-full" onchange="loadDeck('B', this)">
                    <div class="flex gap-2"><button onclick="playDeck('B')" class="bg-green-600 px-4 py-2 rounded">▶️</button></div>
                </div>
            </div>
            <input type="range" min="0" max="1" step="0.01" value="0.5" class="w-full accent-amber-500" oninput="crossfade(this.value)">
        </div>

        <!-- ⚡ 독립적인 FX & TTS 컨트롤 (마스터 출력 연결) -->
        <div class="col-span-4 bg-slate-900 p-6 rounded-3xl border border-sky-900 space-y-4">
            <h2 class="text-xl font-bold text-sky-400">⚡ Master FX & TTS</h2>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="playSfx('chime')" class="bg-sky-700 hover:bg-sky-600 p-3 rounded font-bold">🔔 차임</button>
                <button onclick="playSfx('fanfare')" class="bg-sky-700 hover:bg-sky-600 p-3 rounded font-bold">🎺 팡파르</button>
            </div>
            <textarea id="ttsText" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-600" placeholder="방송할 대사..."></textarea>
            <button onclick="speak()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold hover:bg-emerald-500">🔊 방송 송출 (최대 볼륨)</button>
        </div>
    </div>

    <script>
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 믹서용 게인 노드
        const mixerA = ctx.createGain();
        const mixerB = ctx.createGain();
        mixerA.connect(ctx.destination);
        mixerB.connect(ctx.destination);

        let decks = { A: { gain: mixerA, buffer: null, source: null }, B: { gain: mixerB, buffer: null, source: null } };

        async function loadDeck(id, input) {
            const file = input.files[0];
            const arr = await file.arrayBuffer();
            decks[id].buffer = await ctx.decodeAudioData(arr);
        }

        function playDeck(id) {
            if (decks[id].source) decks[id].source.stop();
            decks[id].source = ctx.createBufferSource();
            decks[id].source.buffer = decks[id].buffer;
            decks[id].source.connect(decks[id].gain);
            decks[id].source.start();
        }

        function crossfade(val) {
            mixerA.gain.value = Math.cos(val * Math.PI / 2);
            mixerB.gain.value = Math.sin(val * Math.PI / 2);
        }

        // 효과음 출력 강화 (직접 마스터 연결 + 볼륨 증폭)
        function playSfx(type) {
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            // FX 출력 볼륨 0.8로 대폭 상향
            gainNode.gain.value = 0.8; 
            
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            if(type === 'chime') osc.frequency.value = 880;
            else if(type === 'fanfare') osc.frequency.value = 523;
            
            osc.start();
            osc.stop(ctx.currentTime + 0.5);
        }

        // TTS 볼륨 강제 세팅 및 보정
        function speak() {
            const text = document.getElementById('ttsText').value;
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ko-KR';
            u.volume = 1.0; // 시스템 최대 볼륨 설정
            u.rate = 1.0;
            u.pitch = 1.0;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
